<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>KuhanGames</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1, #FFA07A, #98D8C8, #F7DC6F, #BB8FCE);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      margin: 0;
      padding: 12px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: start;
    }

    #app {
      width: 100%;
      max-width: 900px;
      padding: 12px;
      box-sizing: border-box;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      color: #FFD700;
      text-shadow: 2px 2px 4px #333;
      font-size: 2.6em;
      margin: 8px 0 4px;
      line-height: 1.1;
    }
    .tagline {
      color: #FFF;
      font-size: 1.1em;
      margin-bottom: 16px;
      max-width: 740px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.3;
    }
    #menu {
      margin: 12px 0 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    #menu button {
      flex: 1 1 auto;
      min-width: 200px;
      max-width: 300px;
    }
    #game-container {
      margin-top: 8px;
      min-height: 320px;
      border: 4px solid #FFD700;
      border-radius: 20px;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      h1 {
        font-size: 2em;
      }
      p {
        font-size: 1em;
      }
      #menu button {
        padding: 15px 20px;
        font-size: 16px;
        min-width: 150px;
      }
      #game-container {
        padding: 10px;
        min-height: 300px;
      }
      #settings-panel {
        width: 90%;
        max-width: 400px;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1.5em;
      }
      #menu button {
        padding: 12px 15px;
        font-size: 14px;
        min-width: 120px;
      }
      #game-container {
        padding: 5px;
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Welcome to KuhanGames</h1>
    <p class="tagline">Play bright, happy games that sparkle with color and sound!</p>
    <div id="game-container">
    <!-- Content will be rendered here by the script -->
  </div>
  <div id="settings-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(45deg, #FFD700, #FF6B6B); padding: 20px; border: 4px solid #333; border-radius: 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h3 style="color: #333; margin-top: 0;">Accessibility Settings</h3>
    <label style="color: #333; display: block; margin: 10px 0;">Volume: <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5"></label><br>
    <label style="color: #333; display: block; margin: 10px 0;">Speech Rate: <input type="range" id="speech-slider" min="0.5" max="2" step="0.1" value="1"></label><br>
    <label style="color: #333; display: block; margin: 10px 0;">Visual Intensity: <input type="range" id="visual-slider" min="0.5" max="2" step="0.1" value="1"></label><br>
    <button onclick="saveSettings()" style="background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-right: 10px;">Save Settings</button>
    <button onclick="hideSettings()" style="background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Close</button>
  </div>
  <div id="settings-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(45deg, #FFD700, #FF6B6B); padding: 20px; border: 4px solid #333; border-radius: 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h3 style="color: #333; margin-top: 0;">Accessibility Settings</h3>
    <label style="color: #333; display: block; margin: 10px 0;">Volume: <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5"></label><br>
    <label style="color: #333; display: block; margin: 10px 0;">Speech Rate: <input type="range" id="speech-slider" min="0.5" max="2" step="0.1" value="1"></label><br>
    <label style="color: #333; display: block; margin: 10px 0;">Visual Intensity: <input type="range" id="visual-slider" min="0.5" max="2" step="0.1" value="1"></label><br>
    <button onclick="saveSettings()" style="background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-right: 10px;">Save Settings</button>
    <button onclick="hideSettings()" style="background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Close</button>
  </div>
    <script src="renderer.js"></script>
  </div>
</body>
</html>
